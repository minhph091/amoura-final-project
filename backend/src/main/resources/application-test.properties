# Test Application Configuration
spring.application.name=Amoura Dating App - Test

# Test Database Configuration
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/amoura_test}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:test_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:test_password}

# Tắt log Hibernate
logging.level.org.hibernate=OFF
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF

# Tắt log Flyway
logging.level.org.flywaydb.core=OFF


# Tắt log JPA chung
logging.level.org.springframework.orm.jpa=OFF

# Tắt log DataSource
logging.level.org.springframework.jdbc.datasource=OFF



# Logging Configuration for Tests
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.com.amoura=DEBUG 